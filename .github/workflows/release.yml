# Manor Release Workflow
#
# Builds, signs, notarizes, and publishes Manor to GitHub Releases.
# Triggered by pushing a version tag (e.g., git tag v0.2.0 && git push --tags).
#
# Required repository secrets:
#
#   CSC_LINK
#     Base64-encoded .p12 certificate for macOS code signing.
#     Export from Keychain Access: Developer ID Application certificate -> Export as .p12
#     Then: base64 -i certificate.p12 | pbcopy
#
#   CSC_KEY_PASSWORD
#     Password used when exporting the .p12 certificate.
#
#   APPLE_ID
#     Apple ID email address for notarization (must be enrolled in Apple Developer Program).
#
#   APPLE_APP_SPECIFIC_PASSWORD
#     App-specific password for notarization.
#     Generate at: https://appleid.apple.com -> Sign-In and Security -> App-Specific Passwords
#
#   APPLE_TEAM_ID
#     Your Apple Developer Team ID.
#     Find at: https://developer.apple.com/account -> Membership Details

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        run: pnpm run build && pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
